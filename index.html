<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Privacy Policies — lgt.wtf</title>
<meta name="description" content="Privacy policies for apps published by lgt.">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6b7280;
    --rule: #e5e7eb;
    --accent: #2563eb;
    --card: #f9fafb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --fg: #e6e8eb;
      --muted: #9aa3ad;
      --rule: #262a31;
      --accent: #6ea8fe;
      --card: #161a20;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 64px 24px 96px; }
  h1 { font-size: 1.8rem; margin: 0 0 8px; letter-spacing: -0.01em; }
  .lede { color: var(--muted); margin: 0 0 40px; }
  ul.apps { list-style: none; margin: 0; padding: 0; }
  ul.apps li { margin: 0 0 12px; }
  ul.apps a {
    display: block;
    text-decoration: none;
    color: var(--fg);
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 16px 20px;
    transition: border-color 0.15s ease;
  }
  ul.apps a:hover { border-color: var(--accent); }
  ul.apps .name { font-weight: 600; }
  ul.apps .desc { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }
  ul.apps .arrow { float: right; color: var(--muted); }
  footer {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Privacy Policies</h1>
  <p class="lede">Privacy policies for apps published under <strong>lgt.wtf</strong>.
  Select an app below.</p>

  <ul class="apps">
    <li>
      <a href="/loot-lab">
        <span class="arrow">&rsaquo;</span>
        <span class="name">Loot Lab</span>
        <span class="desc">privacy.lgt.wtf/loot-lab</span>
      </a>
    </li>
    <li>
      <a href="/reel">
        <span class="arrow">&rsaquo;</span>
        <span class="name">觀影編年史 (Reel)</span>
        <span class="desc">privacy.lgt.wtf/reel</span>
      </a>
    </li>
  </ul>

  <footer>
    <p>Questions about privacy? Contact
    <a href="mailto:privacy@lgt.wtf">privacy@lgt.wtf</a>.</p>
  </footer>
</div>
</body>
</html>
